name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build platform archives
        run: |
          set -eu
          version="${GITHUB_REF_NAME}"
          win="dist/codex-feishu-bridge-windows-${version}"
          mac="dist/codex-feishu-bridge-macos-${version}"
          mkdir -p "$win/bridge/tests" "$win/tests" "$mac/bridge/tests"

          cp README.md LICENSE SECURITY.md Install.ps1 CodexFeishuNotifier.ps1 "$win/"
          cp tests/Run-Tests.ps1 "$win/tests/"
          cp bridge/bridge.js bridge/bridge-admin.js bridge/CodexFeishuBridge.ps1 bridge/package.json bridge/package-lock.json "$win/bridge/"
          cp bridge/tests/bridge.test.js bridge/tests/bridge-admin.test.js bridge/tests/Run-PowerShellTests.ps1 "$win/bridge/tests/"

          cp README.md LICENSE SECURITY.md Install.sh "$mac/"
          cp bridge/bridge.js bridge/bridge-admin.js bridge/CodexFeishuBridge.sh bridge/package.json bridge/package-lock.json "$mac/bridge/"
          cp bridge/tests/bridge.test.js bridge/tests/bridge-admin.test.js bridge/tests/run-macos-tests.sh "$mac/bridge/tests/"
          chmod +x "$mac/Install.sh" "$mac/bridge/CodexFeishuBridge.sh" "$mac/bridge/tests/run-macos-tests.sh"

          (cd dist && zip -qr "codex-feishu-bridge-windows-${version}.zip" "codex-feishu-bridge-windows-${version}")
          (cd dist && zip -qr "codex-feishu-bridge-macos-${version}.zip" "codex-feishu-bridge-macos-${version}")
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/codex-feishu-bridge-windows-${GITHUB_REF_NAME}.zip" \
            "dist/codex-feishu-bridge-macos-${GITHUB_REF_NAME}.zip" \
            --verify-tag --generate-notes --title "Codex Feishu Bridge ${GITHUB_REF_NAME}"
